name: CI

on: [push, pull_request]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 구문 검사 ──
      - name: Python 구문 검사
        run: python -m py_compile src/build/*.py src/collect/*.py src/analysis/*.py
      - name: JS 구문 검사
        run: for f in site/js/*.js; do node --check "$f"; done

      # ── 계약 테스트 (fixture 만으로) ──
      # data/ 는 저장소에 커밋돼 있고 빠진 것은 자매 저장소 '수지'(SUJI) 자료뿐이므로,
      # SUJI_DIR 만 tests/fixtures 로 모사하면 실제 빌드가 CI 에서 재현된다.
      - name: 빌드 (fixture SUJI → 지표 번들 · 단일 HTML)
        env:
          SUJI_DIR: tests/fixtures
        run: |
          python src/build/site_data.py
          python src/build/assemble.py
      - name: pytest (Python 계약 — 80% 기준분기 · 리츠 지표)
        run: |
          python -m pip install --quiet pytest
          python -m pytest -q tests
      - name: node 계약 (빌드 산출 web/index.html — 해시 라우트 · 앱바)
        run: node tests/test_routes.js

      # ── 반응형 스모크 (외부 반응형 감사) — 5뷰포트 가로 오버플로 0·핵심 터치 타깃 ≥44px ──
      # Chrome 헤드리스(CDP, 의존성 0). ubuntu 러너 preinstall google-chrome 사용.
      # 브라우저·산출물 부재 시 자동 skip(exit 0) → 기존 CI green 유지. web/은 위 빌드가 생성.
      - name: Ensure Chrome (install if missing · non-blocking)
        run: |
          if command -v google-chrome >/dev/null 2>&1 || command -v chromium >/dev/null 2>&1 || command -v chromium-browser >/dev/null 2>&1; then
            echo "브라우저 존재 → 설치 생략"
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq chromium || echo "설치 실패 — 반응형 검사 자동 skip"
          fi
      - name: 반응형 스모크 (다중 해상도)
        run: node tests/responsive_check.js
