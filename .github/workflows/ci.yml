name: CI

on: [push, pull_request]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 구문 검사 ──
      - name: Python 구문 검사
        run: python -m py_compile src/build/*.py src/collect/*.py src/analysis/*.py
      - name: JS 구문 검사
        run: for f in site/js/*.js; do node --check "$f"; done

      # ── 계약 테스트 (fixture 만으로) ──
      # data/ 는 저장소에 커밋돼 있고 빠진 것은 자매 저장소 '수지'(SUJI) 자료뿐이므로,
      # SUJI_DIR 만 tests/fixtures 로 모사하면 실제 빌드가 CI 에서 재현된다.
      - name: 빌드 (fixture SUJI → 지표 번들 · 단일 HTML)
        env:
          SUJI_DIR: tests/fixtures
        run: |
          python src/build/site_data.py
          python src/build/assemble.py
      - name: pytest (Python 계약 — 80% 기준분기 · 리츠 지표)
        run: |
          python -m pip install --quiet pytest
          python -m pytest -q tests
      - name: node 계약 (빌드 산출 web/index.html — 해시 라우트 · 앱바)
        run: node tests/test_routes.js
